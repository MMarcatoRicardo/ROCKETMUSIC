<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Rocket Music</title>

<!-- 👇 COLOQUE AQUI -->
<meta property="og:title" content="Rocket Music" />
<meta property="og:description" content="Ministério de Louvor do Rocket Curitiba" />
<meta property="og:image" content="https://rocketmusic.com.br/preview.png" />
<meta property="og:url" content="https://rocketmusic.com.br" />
<meta property="og:type" content="website" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Rocket Music" />
<meta name="twitter:description" content="Ministério de Louvor do Rocket Curitiba" />
<meta name="twitter:image" content="https://rocketmusic.com.br/preview.png" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --or:#FF6A00;--or2:#FF8C33;--ord:rgba(255,106,0,.14);--orb:rgba(255,106,0,.28);
  --bg:#0d0d0d;--bg2:#111;--bg3:#161616;--bg4:#1a1a1a;--bg5:#1e1e1e;
  --bd:#1e1e1e;--bd2:#252525;--bd3:#2a2a2a;
  --tx:#e5e5e5;--tx2:#888;--tx3:#555;--tx4:#333;
  --red:#e63946;--green:#06d6a0;--blue:#4da6ff;--gold:#FFD166;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* ── APP ── */
#screen-app{display:block;min-height:100vh}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:200;
  background:rgba(13,13,13,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  max-width:640px;margin:0 auto;
  padding:16px 16px 0;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-flame{font-size:20px}
.logo-text h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.2px;line-height:1}
.logo-text p{font-size:10px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bd2);object-fit:cover}
.user-name{font-size:11px;color:var(--tx3);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-edit{
  display:flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:8px;
  background:transparent;border:1px solid var(--bd2);
  color:var(--tx3);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;letter-spacing:.04em;
}
.btn-edit:hover,.btn-edit.active{border-color:var(--or);color:var(--or);background:var(--ord)}
.btn-edit svg{width:12px;height:12px}

/* ── TABS ── */
.tab-bar{display:flex;max-width:640px;margin:0 auto;padding:0 4px}
.tab-btn{
  flex:1;padding:10px 4px 12px;
  background:transparent;border:none;
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  color:var(--tx3);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;letter-spacing:.08em;text-transform:uppercase;
}
.tab-btn:hover{color:var(--tx2)}
.tab-btn.active{color:var(--or);border-bottom-color:var(--or)}

/* ── MAIN ── */
.app-main{max-width:640px;margin:0 auto;padding:20px 16px 80px}
.tab-panel{display:none;animation:fadeIn .2s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION LABEL ── */
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.22em;color:var(--or);opacity:.8;margin-bottom:12px}

/* ── ACCORDION ── */
.acc{border:1px solid #222;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.acc-btn{width:100%;background:var(--bg3);border:none;color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:0;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.acc-btn:hover{background:#1d1d1d}
.acc-btn .ab-left{display:flex;align-items:center;gap:10px;padding:16px 18px;flex:1}
.acc-btn .ab-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;padding:16px 16px 16px 0}
.acc-btn .ab-icon{font-size:17px}
.acc-btn .ab-hint{font-size:10px;color:#444;font-weight:400;letter-spacing:.03px;white-space:nowrap}
.acc-btn .ab-chev{font-size:13px;color:#555;transition:transform .25s ease,color .2s;line-height:1}
.acc.open .acc-btn .ab-chev{transform:rotate(180deg);color:var(--or)}
.acc.open .acc-btn{background:#1a1a1a}
.acc.open .acc-btn .ab-left{color:var(--or2)}
.acc.open .acc-btn .ab-hint{display:none}
.acc.open{box-shadow:0 0 0 1px var(--orb);border-color:var(--orb)}
.acc-body{display:none;padding:16px 18px 20px;border-top:1px solid var(--bd);background:#111}
.acc.open .acc-body{display:block;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── ESCALA ── */
.escala-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.escala-nav-btn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.escala-nav-btn:hover{border-color:var(--or);color:var(--or)}
.escala-nav-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
.escala-nav-center{flex:1;text-align:center}
.escala-nav-name{font-size:14px;font-weight:700;color:#fff}
.escala-nav-date{font-size:11px;color:var(--tx3);margin-top:2px}
.escala-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:14px;gap:12px;transition:background .12s}
.escala-row:last-child{border-bottom:none}
.escala-row:hover{background:var(--bg3);border-radius:6px;padding-left:6px}
.e-role{color:#666;font-size:12px;min-width:140px}
.e-nome{color:#f0f0f0;font-weight:600}

/* ── SETLIST ── */
.set-group{margin-bottom:22px}
.set-group:last-child{margin-bottom:0}
.set-group-title{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--or);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd);opacity:.85}
.song{display:flex;align-items:flex-start;gap:12px;padding:9px 4px;border-bottom:1px solid #1a1a1a;font-size:13px;border-radius:6px;transition:background .12s}
.song:hover{background:var(--bg3)}
.song:last-child{border-bottom:none}
.song-n{color:#3a3a3a;min-width:20px;font-size:12px;padding-top:2px;font-variant-numeric:tabular-nums}
.song-info{flex:1}
.song-name{color:#e8e8e8;font-weight:500;line-height:1.4}
.song-artist{color:#555;font-size:12px;margin-top:2px}
.song-key{font-size:11px;font-weight:700;color:var(--or2);background:var(--ord);border:1px solid rgba(255,106,0,.22);padding:2px 8px;border-radius:5px;flex-shrink:0;margin-top:2px}

/* ── LITURGIA ── */
.liturgia{position:relative;margin-top:4px}
.liturgia::before{content:'';position:absolute;left:14px;top:0;bottom:0;width:2px;background:#1f1f1f}
.lit-step{position:relative;padding:14px 14px 14px 40px;border-bottom:1px solid #1a1a1a;transition:background .15s}
.lit-step:last-child{border-bottom:none}
.lit-step:hover{background:#161616;border-radius:6px}
.lit-num{position:absolute;left:4px;top:16px;width:20px;height:20px;border-radius:50%;background:var(--or);color:#000;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.lit-title{font-weight:600;font-size:14px;color:#f5f5f5;margin-bottom:4px}
.lit-songs{font-size:12px;color:#888;line-height:1.6;margin-top:6px}

/* ── MATERIAIS ── */
.mat-label{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#444;margin-bottom:8px;margin-top:16px}
.mat-label:first-child{margin-top:0}
.btn-mat{display:flex;align-items:center;gap:12px;width:100%;padding:13px 16px;background:var(--bg4);border:1px solid var(--bd3);border-radius:8px;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;text-decoration:none;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.btn-mat:hover{border-color:var(--or)}
.btn-mat .mat-icon{font-size:18px;flex-shrink:0}
.btn-mat .mat-text{flex:1}
.btn-mat .mat-hint{font-size:11px;color:#555}
.btn-mat.yt{background:#1a0000;border-color:#3a1111;color:#ff5555}
.btn-mat.yt:hover{border-color:#ff4444}
.btn-mat.sp{background:#001a08;border-color:#0f3d1a;color:#1ed760}
.btn-mat.sp:hover{border-color:#1ed760}
.btn-mat.drive{background:#001220;border-color:#0a2a44;color:var(--blue)}
.btn-mat.drive:hover{border-color:var(--blue)}
.mat-nota{background:#141006;border:1px solid #2e2200;border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.6;color:#999;margin-top:14px}
.mat-nota strong{color:var(--gold)}

/* ── DRESS CODE ── */
.dc-wrap{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0}
.dc-fire{font-size:28px;flex-shrink:0}
.dc-colors{display:flex;flex-wrap:wrap;justify-content:center;gap:16px}
.dc-dot{width:42px;height:42px;border-radius:50%}

/* ── COUNTDOWN ── */
.countdown{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap}
.cd-block{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px 18px;text-align:center;min-width:72px}
.cd-num{font-size:30px;font-weight:700;color:var(--or);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.cd-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.17em;color:#444;margin-top:5px}
.cd-done{font-size:18px;font-weight:700;color:var(--or);padding:14px 0;text-align:center}

/* ── INFO BOX ── */
.info-box{background:#141414;border:1px solid #222;border-radius:12px;padding:14px 16px;margin-bottom:10px;font-size:13px;display:flex;align-items:center;gap:14px;color:#888;line-height:1.5}
.info-box .ib-icon{font-size:22px;flex-shrink:0}
.info-box strong{color:#f0f0f0;display:block;margin-bottom:2px;font-size:14px;font-weight:600}

/* ── PRÓXIMOS EVENTOS ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx3);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.filter-chip:hover{border-color:var(--tx2);color:var(--tx2)}
.filter-chip.active{background:var(--ord);border-color:var(--orb);color:var(--or)}

.event-card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.event-card:hover{border-color:var(--bd3);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.event-card.featured{border-color:var(--orb);box-shadow:0 0 0 1px var(--ord)}
.event-card-header{padding:16px 18px;display:flex;align-items:center;gap:14px}
.event-date-badge{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:52px}
.event-date-badge .edb-day{font-size:22px;font-weight:800;color:#fff;line-height:1}
.event-date-badge .edb-mon{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-top:2px}
.event-card.featured .event-date-badge{background:var(--ord);border-color:var(--orb)}
.event-card.featured .event-date-badge .edb-day{color:var(--or)}
.event-card-info{flex:1;min-width:0}
.event-card-name{font-size:15px;font-weight:700;color:#fff;line-height:1.3}
.event-card-meta{font-size:12px;color:var(--tx3);margin-top:4px}
.event-card-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--ord);color:var(--or);border:1px solid var(--orb);flex-shrink:0}
.event-card-arrow{color:var(--tx4);font-size:14px;flex-shrink:0}
.event-empty{text-align:center;padding:48px 20px;color:var(--tx3)}
.event-empty .ee-icon{font-size:36px;margin-bottom:12px}
.event-empty .ee-title{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:6px}
.event-empty .ee-sub{font-size:12px}

/* ── EVENTOS PASSADOS ── */
.past-card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.past-card:hover{border-color:var(--bd3)}
.past-card-img{width:100%;height:140px;object-fit:cover;display:block;background:var(--bg3)}
.past-card-img-placeholder{width:100%;height:140px;background:linear-gradient(135deg,var(--bg3) 0%,var(--bg4) 100%);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--bd3)}
.past-card-body{padding:14px 16px}
.past-card-name{font-size:14px;font-weight:700;color:#fff}
.past-card-meta{font-size:12px;color:var(--tx3);margin-top:4px}

/* ── EVENT DETAIL VIEW ── */
#event-detail{display:none}
#event-detail.active{display:block}
.detail-header{padding:24px 20px 20px;text-align:center;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,#141414 0%,var(--bg) 100%)}
.detail-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--tx3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;margin-bottom:16px;padding:0;transition:color .15s}
.detail-back:hover{color:var(--or)}
.detail-back svg{width:14px;height:14px}
.detail-tag{font-size:10px;text-transform:uppercase;letter-spacing:.22em;color:var(--or);margin-bottom:8px;opacity:.9}
.detail-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.3px}
.detail-sub{font-size:13px;color:#5a5a5a;margin-top:6px}
.detail-verse{font-size:12px;color:#4a4a4a;margin-top:14px;font-style:italic;line-height:1.6;max-width:380px;margin-left:auto;margin-right:auto;border-top:1px solid var(--bd);padding-top:14px}

/* ── ADMIN PANEL ── */
#admin-panel{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
#admin-panel.active{display:flex;animation:fadeIn .2s ease}
.admin-sheet{
  width:100%;max-width:640px;max-height:90vh;
  background:var(--bg2);border:1px solid var(--bd);
  border-radius:20px 20px 0 0;
  overflow-y:auto;
  animation:slideUp .3s ease both;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.admin-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:10;border-bottom:1px solid var(--bd);padding-bottom:16px}
.admin-title{font-size:16px;font-weight:700;color:#fff}
.admin-close{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.admin-close:hover{background:var(--bg4);color:#fff}
.admin-body{padding:20px}

/* admin event list */
.admin-event-item{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.admin-event-item:hover{border-color:var(--or)}
.admin-event-item .aei-date{font-size:12px;font-weight:700;color:var(--or);min-width:48px}
.admin-event-item .aei-name{flex:1;font-size:13px;font-weight:600;color:#fff}
.admin-event-item .aei-type{font-size:10px;color:var(--tx3);background:var(--bg4);padding:2px 8px;border-radius:4px}
.admin-event-item .aei-arrow{color:var(--tx4);font-size:12px}
.btn-new-event{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--ord);border:1px dashed var(--orb);border-radius:10px;color:var(--or);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:16px}
.btn-new-event:hover{background:rgba(255,106,0,.2)}

/* ── EVENT FORM ── */
#event-form{display:none}
#event-form.active{display:block}
.form-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--tx3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;margin-bottom:20px;padding:0;transition:color .15s}
.form-back:hover{color:var(--or)}
.fgroup{margin-bottom:16px}
.fgroup label{display:block;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.finput,.ftextarea,.fselect{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.finput:focus,.ftextarea:focus,.fselect:focus{border-color:var(--or)}
.ftextarea{resize:vertical;min-height:80px;line-height:1.5}
.fselect{cursor:pointer}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-section{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--or);opacity:.8;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}

/* dynamic lists in form */
.dyn-list{margin-bottom:8px}
.dyn-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dyn-item .finput{flex:1;margin:0}
.dyn-item .dyn-del{width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid var(--bd2);color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:14px}
.dyn-item .dyn-del:hover{border-color:var(--red);color:var(--red)}
.btn-add-item{display:flex;align-items:center;gap:6px;padding:8px 12px;background:transparent;border:1px dashed var(--bd3);border-radius:8px;color:var(--tx3);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;width:100%}
.btn-add-item:hover{border-color:var(--or);color:var(--or)}

/* setlist group in form */
.sg-block{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px;margin-bottom:8px}
.sg-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sg-header .finput{flex:1;margin:0}
.sg-header .dyn-del{flex-shrink:0}
.sg-songs{padding-left:4px}

/* dress code dots in form */
.dc-form-colors{display:flex;flex-wrap:wrap;gap:10px;padding:8px 0}
.dc-form-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;position:relative;transition:transform .15s}
.dc-form-dot:hover{transform:scale(1.1)}
.dc-form-dot.sel::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.dc-add-color{width:36px;height:36px;border-radius:50%;border:1.5px dashed var(--bd3);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx4);font-size:18px;transition:all .15s}
.dc-add-color:hover{border-color:var(--or);color:var(--or)}
input[type=color]{opacity:0;position:absolute;width:1px;height:1px}

/* form actions */
.form-actions{display:flex;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--bd)}
.btn-save-event{flex:1;padding:13px;background:var(--or);border:none;border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-save-event:hover{background:var(--or2)}
.btn-delete-event{padding:13px 18px;background:transparent;border:1px solid var(--bd2);border-radius:10px;color:var(--tx3);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-delete-event:hover{border-color:var(--red);color:var(--red)}

async function loadEvents(){
  try{
    const q=query(collection(db,EVENTS_COL),orderBy("data","asc"));
    const snap=await getDocs(q);
    allEvents=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Seed Firenight se ainda não existir
    if(!allEvents.find(e=>e.data==="2026-03-28")){
      try{
        const ref=await addDoc(collection(db,EVENTS_COL),FIRENIGHT_DATA);
        allEvents.push({id:ref.id,...FIRENIGHT_DATA});
        allEvents.sort((a,b)=>a.data.localeCompare(b.data));
      }catch(e){console.warn("Seed falhou (Firestore rules?):",e)}
    }
    renderAll();
  }catch(e){console.error(e);toast("Erro ao carregar eventos","err")}
}

// ── HELPERS ──
function parseDate(s){return s?new Date(s+"T12:00:00"):null}
function fmtDate(s){const d=parseDate(s);if(!d)return"";return d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}
function fmtShort(s){const d=parseDate(s);if(!d)return"";return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"})}
function getDay(s){const d=parseDate(s);return d?String(d.getDate()).padStart(2,"0"):"--"}
function getMon(s){const d=parseDate(s);return d?d.toLocaleDateString("pt-BR",{month:"short"}).replace(".",""):"---"}
const today=new Date();today.setHours(0,0,0,0);
function isFuture(s){const d=parseDate(s);return d&&d>=today}
function isPast(s){const d=parseDate(s);return d&&d<today}

// ── COUNTDOWN ──
let cdInterval=null;
function startCountdown(dateStr,horaStr,containerId){
  if(cdInterval)clearInterval(cdInterval);
  const target=new Date(dateStr+"T"+(horaStr||"00:00")+":00");
  function update(){
    const diff=target-new Date();
    const el=document.getElementById(containerId);if(!el)return clearInterval(cdInterval);
    if(diff<=0){el.innerHTML=`<div class="cd-done">É hoje! Vamos ser incendiados 🔥</div>`;clearInterval(cdInterval);return}
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    el.innerHTML=`<div class="cd-block"><div class="cd-num">${String(d).padStart(2,"0")}</div><div class="cd-lbl">Dias</div></div><div class="cd-block"><div class="cd-num">${String(h).padStart(2,"0")}</div><div class="cd-lbl">Horas</div></div><div class="cd-block"><div class="cd-num">${String(m).padStart(2,"0")}</div><div class="cd-lbl">Min</div></div><div class="cd-block"><div class="cd-num">${String(s).padStart(2,"0")}</div><div class="cd-lbl">Seg</div></div>`;
  }
  update();cdInterval=setInterval(update,1000);
}

// ── SATURDAY HELPERS ──
// Gera lista de sábados: 8 semanas atrás até 12 semanas à frente
function getSaturdays(){
  const sats=[];
  const ref=new Date();ref.setHours(0,0,0,0);
  // Encontra o sábado mais próximo passado ou atual
  const dayOfWeek=ref.getDay(); // 0=Dom ... 6=Sab
  const daysToLastSat=dayOfWeek===6?0:dayOfWeek+1;
  const base=new Date(ref);base.setDate(ref.getDate()-daysToLastSat);
  for(let i=-8;i<=12;i++){
    const d=new Date(base);d.setDate(base.getDate()+i*7);
    sats.push(toDateStr(d));
  }
  return sats;
}
function toDateStr(d){return d.toISOString().slice(0,10)}
function todaySaturday(){
  // Índice do sábado atual (ou próximo) na lista
  const sats=getSaturdays();
  const td=toDateStr(new Date());
  // pega o primeiro sábado >= hoje
  const idx=sats.findIndex(s=>s>=td);
  return idx>=0?idx:sats.length-1;
}
function fmtSaturdayNav(dateStr){
  const d=parseDate(dateStr);if(!d)return dateStr;
  const mes=d.toLocaleDateString("pt-BR",{month:"long"});
  const dia=String(d.getDate()).padStart(2,"0");
  return `${mes.charAt(0).toUpperCase()+mes.slice(1)} ${dia}`;
}

// ── TAB: ESCALA ──
// escalaEventIndex agora é índice dentro de getSaturdays()
function initEscalaIndex(){
  if(escalaEventIndex===-1) escalaEventIndex=todaySaturday();
}

function renderEscala(){
  initEscalaIndex();
  const sats=getSaturdays();
  if(escalaEventIndex<0)escalaEventIndex=0;
  if(escalaEventIndex>=sats.length)escalaEventIndex=sats.length-1;

  const satDate=sats[escalaEventIndex];
  // Procura evento cadastrado nesse sábado
  const ev=allEvents.find(e=>e.data===satDate)||null;
  const escala=ev?.escala||[];
  const el=document.getElementById("escala-content");

  el.innerHTML=`
    <div class="escala-nav">
      <button class="escala-nav-btn" id="escala-prev" ${escalaEventIndex===0?"disabled":""}>‹</button>
      <div class="escala-nav-center">
        <div class="escala-nav-name">${ev?ev.nome||"Evento":"Sábado"}</div>
        <div class="escala-nav-date">${fmtSaturdayNav(satDate)}</div>
      </div>
      <button class="escala-nav-btn" id="escala-next" ${escalaEventIndex>=sats.length-1?"disabled":""}>›</button>
    </div>

    ${ev?`<div class="info-box"><span class="ib-icon">${ev.tipo==="Firenight"?"🔥":"📅"}</span><div><strong>${ev.nome||"Evento"}</strong>${fmtDate(ev.data)}${ev.hora?" às "+ev.hora:""}</div></div>`:""}

    <div class="acc open" id="acc-escala">
      <button class="acc-btn" onclick="toggleAcc('acc-escala')">
        <span class="ab-left"><span class="ab-icon">👥</span> Escala</span>
        <span class="ab-right"><span class="ab-chev">▼</span></span>
      </button>
      <div class="acc-body">
        ${escala.length
          ? escala.map(p=>`<div class="escala-row"><span class="e-role">${p.emoji||""} ${p.funcao||""}</span><span class="e-nome">${p.nome||""}</span></div>`).join("")
          : `<div style="padding:16px 0;text-align:center;color:var(--tx3);font-size:13px">Escala ainda não definida para este sábado.</div>`
        }
      </div>
    </div>

    ${ev&&isFuture(ev.data)?`<div class="countdown" id="countdown-escala"></div>`:""}
  `;

  if(ev&&isFuture(ev.data)) startCountdown(ev.data,ev.hora||"00:00","countdown-escala");

  document.getElementById("escala-prev").onclick=()=>{escalaEventIndex--;renderEscala()};
  document.getElementById("escala-next").onclick=()=>{escalaEventIndex++;renderEscala()};
}

// ── TAB: PRÓXIMOS EVENTOS ──
function renderProximos(filterType="Todos"){
  const future=allEvents.filter(e=>isFuture(e.data));
  const types=["Todos",...new Set(future.map(e=>e.tipo).filter(Boolean))];
  const fbar=document.getElementById("proximos-filter");
  fbar.innerHTML=types.map(t=>`<div class="filter-chip${t===filterType?" active":""}" data-type="${t}">${t}</div>`).join("");
  fbar.querySelectorAll(".filter-chip").forEach(c=>c.onclick=()=>renderProximos(c.dataset.type));
  const filtered=filterType==="Todos"?future:future.filter(e=>e.tipo===filterType);
  const el=document.getElementById("proximos-content");
  if(!filtered.length){el.innerHTML=`<div class="event-empty"><div class="ee-icon">📅</div><div class="ee-title">Nenhum evento</div><div class="ee-sub">Nenhum próximo evento ${filterType!=="Todos"?"do tipo "+filterType:""}.</div></div>`;return}
  el.innerHTML=filtered.map((ev,i)=>`
    <div class="event-card${i===0?" featured":""}" data-id="${ev.id}">
      <div class="event-card-header">
        <div class="event-date-badge"><div class="edb-day">${getDay(ev.data)}</div><div class="edb-mon">${getMon(ev.data)}</div></div>
        <div class="event-card-info">
          <div class="event-card-name">${ev.nome||"Evento"}</div>
          <div class="event-card-meta">${fmtDate(ev.data)}${ev.hora?" · "+ev.hora:""}</div>
        </div>
        ${ev.tipo?`<div class="event-card-tag">${ev.tipo}</div>`:""}
        <span class="event-card-arrow">›</span>
      </div>
    </div>
  `).join("");
  el.querySelectorAll(".event-card").forEach(c=>c.onclick=()=>{
    detailFromTab="proximos";openEventDetail(c.dataset.id);
  });
}

// ── TAB: EVENTOS PASSADOS ──
function renderPassados(filterType="Todos"){
  const past=allEvents.filter(e=>isPast(e.data)).sort((a,b)=>b.data.localeCompare(a.data));
  const types=["Todos",...new Set(past.map(e=>e.tipo).filter(Boolean))];
  const fbar=document.getElementById("passados-filter");
  fbar.innerHTML=types.map(t=>`<div class="filter-chip${t===filterType?" active":""}" data-type="${t}">${t}</div>`).join("");
  fbar.querySelectorAll(".filter-chip").forEach(c=>c.onclick=()=>renderPassados(c.dataset.type));
  const filtered=filterType==="Todos"?past:past.filter(e=>e.tipo===filterType);
  const el=document.getElementById("passados-content");
  if(!filtered.length){el.innerHTML=`<div class="event-empty"><div class="ee-icon">📸</div><div class="ee-title">Sem eventos passados</div><div class="ee-sub">Os eventos realizados aparecerão aqui.</div></div>`;return}
  el.innerHTML=filtered.map(ev=>`
    <div class="past-card" data-id="${ev.id}">
      ${ev.foto?`<img class="past-card-img" src="${ev.foto}" alt="${ev.nome||""}" loading="lazy" onerror="this.style.display='none'">`:`<div class="past-card-img-placeholder">📸</div>`}
      <div class="past-card-body">
        <div class="past-card-name">${ev.nome||"Evento"}</div>
        <div class="past-card-meta">${fmtDate(ev.data)}${ev.tipo?" · "+ev.tipo:""}</div>
      </div>
    </div>
  `).join("");
  el.querySelectorAll(".past-card").forEach(c=>c.onclick=()=>{
    detailFromTab="passados";openEventDetail(c.dataset.id);
  });
}

// ── EVENT DETAIL ──
function openEventDetail(id){
  const ev=allEvents.find(e=>e.id===id);if(!ev)return;
  document.getElementById("tab-escala").style.display="none";
  document.getElementById("tab-proximos").style.display="none";
  document.getElementById("tab-passados").style.display="none";
  document.querySelector(".tab-bar").style.display="none";
  document.getElementById("event-detail").classList.add("active");
  // render detail
  const escala=ev.escala||[];
  const setlist=ev.setlist||[];
  const liturgia=ev.liturgia||[];
  const materiais=ev.materiais||[];
  const dcColors=ev.dresscode?.cores||[];

  let html=`
    <div class="detail-header">
      <div class="detail-tag">Rocket Music · ${ev.tipo||"Evento"}</div>
      <div class="detail-title">${ev.nome||"Evento"}</div>
      <div class="detail-sub">${fmtDate(ev.data)}${ev.hora?" · "+ev.hora:""}</div>
      ${ev.versiculo?`<div class="detail-verse">"${ev.versiculo}"</div>`:""}
      <div class="countdown" id="countdown-detail"></div>
    </div>
    <div class="wrap" style="max-width:640px;margin:0 auto;padding:20px 16px 60px">
  `;

  if(escala.length) html+=accordion("acc-d-escala","👥","Escala",`
    ${escala.map(p=>`<div class="escala-row"><span class="e-role">${p.emoji||""} ${p.funcao||""}</span><span class="e-nome">${p.nome||""}</span></div>`).join("")}
  `,"clique para ver");

  if(setlist.length) html+=accordion("acc-d-setlist","🎵","Setlist",`
    ${setlist.map(g=>`
      <div class="set-group">
        <div class="set-group-title">${g.titulo||""}</div>
        ${(g.musicas||[]).map((m,i)=>`<div class="song"><span class="song-n">${i+1}</span><div class="song-info"><div class="song-name">${m.nome||""}</div><div class="song-artist">${m.artista||""}</div></div>${m.tom?`<span class="song-key">${m.tom}</span>`:""}</div>`).join("")}
      </div>
    `).join("")}
  `,"clique para ver");

  if(liturgia.length) html+=accordion("acc-d-lit","📋","Ordem do Culto",`
    <div class="liturgia">
      ${liturgia.map((p,i)=>`<div class="lit-step"><div class="lit-num">${i+1}</div><div class="lit-title">${p.titulo||""}</div>${p.musicas?`<div class="lit-songs">${p.musicas}</div>`:""}</div>`).join("")}
    </div>
  `,"clique para ver");

  if(materiais.length) html+=accordion("acc-d-mat","📦","Materiais de Ensaio",`
    ${materiais.map(m=>`<a class="btn-mat" href="${m.url||"#"}" target="_blank" rel="noopener"><span class="mat-icon">${m.emoji||"🔗"}</span><span class="mat-text">${m.nome||""}</span><span class="mat-hint">↗</span></a>`).join("")}
  `,"clique para ver");

  if(dcColors.length) html+=accordion("acc-d-dc","🕶️","Dress Code",`
    <div class="dc-wrap">
      <div class="dc-fire">🔥</div>
      <div class="dc-colors">${dcColors.map(c=>`<div class="dc-dot" style="background:${c};${c==="#ffffff"||c==="#FFFFFF"?"border:1.5px solid #333":""}"></div>`).join("")}</div>
      <div class="dc-fire">🔥</div>
    </div>
    ${ev.dresscode?.obs?`<div style="text-align:center;font-size:12px;color:var(--tx3);margin-top:10px">${ev.dresscode.obs}</div>`:""}
  `,"clique para ver");

  html+="</div>";
  document.getElementById("event-detail-content").innerHTML=html;

  if(isFuture(ev.data)) startCountdown(ev.data,ev.hora,"countdown-detail");
  else document.getElementById("countdown-detail")?.remove();

  // edit button in detail
  document.getElementById("btn-edit-detail").onclick=async()=>{
    if(await requireAdminAndEdit()) openEventFormById(ev.id);
  };
  // wire accordions
  document.getElementById("event-detail-content").querySelectorAll(".acc-btn").forEach(btn=>{
    btn.onclick=()=>toggleAcc(btn.closest(".acc").id);
  });
  window.scrollTo(0,0);
}

function accordion(id,icon,title,body,hint=""){
  return `<div class="acc" id="${id}">
    <button class="acc-btn">
      <span class="ab-left"><span class="ab-icon">${icon}</span> ${title}</span>
      <span class="ab-right"><span class="ab-hint">${hint}</span><span class="ab-chev">▼</span></span>
    </button>
    <div class="acc-body">${body}</div>
  </div>`;
}

document.getElementById("detail-back-btn").onclick=()=>{
  document.getElementById("event-detail").classList.remove("active");
  document.getElementById("event-detail-content").innerHTML="";
  document.querySelector(".tab-bar").style.display="";
  document.getElementById("tab-escala").style.display="";
  document.getElementById("tab-proximos").style.display="";
  document.getElementById("tab-passados").style.display="";
  if(cdInterval)clearInterval(cdInterval);
};

// ── TABS ──
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick=()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-"+currentTab).classList.add("active");
  }
});

// ── TOGGLE ACCORDION ──
window.toggleAcc=function(id){document.getElementById(id)?.classList.toggle("open")};

// ── ADMIN: OPEN/CLOSE ──
document.getElementById("admin-close").onclick=closeAdmin;
document.getElementById("admin-panel").onclick=e=>{if(e.target===document.getElementById("admin-panel"))closeAdmin()};

function openAdmin(){
  document.getElementById("admin-panel").classList.add("active");
  showAdminList();
  renderAdminList();
}
function closeAdmin(){
  document.getElementById("admin-panel").classList.remove("active");
}

function showAdminList(){
  document.getElementById("admin-list-view").style.display="block";
  document.getElementById("event-form").classList.remove("active");
}
function showEventForm(){
  document.getElementById("admin-list-view").style.display="none";
  document.getElementById("event-form").classList.add("active");
  document.getElementById("admin-sheet").scrollTop=0;
}

document.getElementById("form-back-btn").onclick=showAdminList;
document.getElementById("form-close").onclick=closeAdmin;

// ── ADMIN LIST ──
function renderAdminList(){
  const el=document.getElementById("admin-events-list");
  const sorted=[...allEvents].sort((a,b)=>a.data?.localeCompare(b.data));
  if(!sorted.length){el.innerHTML=`<div class="event-empty"><div class="ee-icon">📅</div><div class="ee-sub">Nenhum evento cadastrado.</div></div>`;return}
  el.innerHTML=sorted.map(ev=>`
    <div class="admin-event-item" data-id="${ev.id}">
      <span class="aei-date">${fmtShort(ev.data)}</span>
      <span class="aei-name">${ev.nome||"Sem nome"}</span>
      ${ev.tipo?`<span class="aei-type">${ev.tipo}</span>`:""}
      <span class="aei-arrow">›</span>
    </div>
  `).join("");
  el.querySelectorAll(".admin-event-item").forEach(item=>{
    item.onclick=()=>openEventFormById(item.dataset.id);
  });
}

document.getElementById("btn-new-event").onclick=()=>openEventForm(null);

// ── EVENT FORM: open by id from detail ──
function openEventFormById(id){
  closeAdmin();
  // reopen admin in form mode
  document.getElementById("admin-panel").classList.add("active");
  const ev=allEvents.find(e=>e.id===id);
  if(ev) openEventForm(ev);
}

// ── DRESS CODE COLORS ──
let dcSelected=[];
function renderDcColors(){
  const wrap=document.getElementById("dc-colors-wrap");
  const addBtn=document.getElementById("btn-add-dc-color");
  wrap.innerHTML="";
  dcSelected.forEach((c,i)=>{
    const d=document.createElement("div");d.className="dc-form-dot sel";d.style.background=c;
    if(c==="#ffffff"||c==="#FFFFFF")d.style.border="1.5px solid #333";
    d.title="Clique para remover";d.onclick=()=>{dcSelected.splice(i,1);renderDcColors()};
    wrap.appendChild(d);
  });
  wrap.appendChild(addBtn);
}
document.getElementById("btn-add-dc-color").onclick=()=>document.getElementById("dc-color-picker").click();
document.getElementById("dc-color-picker").oninput=e=>{};
document.getElementById("dc-color-picker").onchange=e=>{
  const c=e.target.value;if(!dcSelected.includes(c)){dcSelected.push(c);renderDcColors()}
};

// ── DYNAMIC LIST HELPERS ──
function addEscalaRow(funcao="",emoji="",nome=""){
  const wrap=document.getElementById("escala-list");
  const row=document.createElement("div");row.className="dyn-item";
  row.innerHTML=`<input class="finput" style="max-width:34px;text-align:center;padding:10px 6px" placeholder="🎹" value="${emoji}" data-field="emoji"><input class="finput" style="max-width:140px" placeholder="Função" value="${funcao}" data-field="funcao"><input class="finput" placeholder="Nome" value="${nome}" data-field="nome"><button class="dyn-del" title="Remover">✕</button>`;
  row.querySelector(".dyn-del").onclick=()=>row.remove();
  wrap.appendChild(row);
}
document.getElementById("btn-add-escala").onclick=()=>addEscalaRow();

function addLitRow(titulo="",musicas=""){
  const wrap=document.getElementById("liturgia-list");
  const row=document.createElement("div");row.className="dyn-item";row.style.alignItems="flex-start";
  row.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;gap:6px"><input class="finput" placeholder="Título do passo (ex: Louvor animado)" value="${titulo}" data-field="titulo"><input class="finput" placeholder="Músicas (opcional, separadas por vírgula)" value="${musicas}" data-field="musicas"></div><button class="dyn-del" title="Remover" style="margin-top:2px">✕</button>`;
  row.querySelector(".dyn-del").onclick=()=>row.remove();
  wrap.appendChild(row);
}
document.getElementById("btn-add-lit").onclick=()=>addLitRow();

function addMatRow(nome="",url="",emoji="🔗"){
  const wrap=document.getElementById("materiais-list");
  const row=document.createElement("div");row.className="dyn-item";
  row.innerHTML=`<input class="finput" style="max-width:38px;text-align:center;padding:10px 6px" placeholder="🔗" value="${emoji}" data-field="emoji"><input class="finput" style="max-width:140px" placeholder="Nome" value="${nome}" data-field="nome"><input class="finput" placeholder="URL ou link" value="${url}" data-field="url"><button class="dyn-del" title="Remover">✕</button>`;
  row.querySelector(".dyn-del").onclick=()=>row.remove();
  wrap.appendChild(row);
}
document.getElementById("btn-add-mat").onclick=()=>addMatRow();

function addSetGroup(titulo="",musicas=[]){
  const wrap=document.getElementById("setlist-groups");
  const block=document.createElement("div");block.className="sg-block";
  block.innerHTML=`
    <div class="sg-header">
      <input class="finput" placeholder="Nome do grupo (ex: Agitadas)" value="${titulo}" data-field="titulo">
      <button class="dyn-del" title="Remover grupo">✕</button>
    </div>
    <div class="sg-songs dyn-list"></div>
    <button class="btn-add-item btn-add-sg-song" style="margin-top:6px">＋ Música</button>
  `;
  block.querySelector(".dyn-del").onclick=()=>block.remove();
  block.querySelector(".btn-add-sg-song").onclick=()=>addSongRow(block.querySelector(".sg-songs"));
  musicas.forEach(m=>addSongRow(block.querySelector(".sg-songs"),m.nome||"",m.artista||"",m.tom||""));
  wrap.appendChild(block);
}
document.getElementById("btn-add-group").onclick=()=>addSetGroup();

function addSongRow(container,nome="",artista="",tom=""){
  const row=document.createElement("div");row.className="dyn-item";
  row.innerHTML=`<input class="finput" placeholder="Nome da música" value="${nome}" data-field="nome"><input class="finput" style="max-width:130px" placeholder="Artista" value="${artista}" data-field="artista"><input class="finput" style="max-width:64px;text-align:center" placeholder="Tom" value="${tom}" data-field="tom"><button class="dyn-del">✕</button>`;
  row.querySelector(".dyn-del").onclick=()=>row.remove();
  container.appendChild(row);
}

const DEFAULT_ESCALA=[
  {emoji:"🎹",funcao:"Teclas",nome:""},
  {emoji:"🥁",funcao:"Bateria",nome:""},
  {emoji:"🎸",funcao:"Guitarra",nome:""},
  {emoji:"🎸",funcao:"Baixo",nome:""},
  {emoji:"🎤",funcao:"Ministra",nome:""},
  {emoji:"🎤",funcao:"Vocais",nome:""},
  {emoji:"🎛️",funcao:"Sonoplasta",nome:""},
];

// ── OPEN FORM ──
function openEventForm(ev){
  editingEventId=ev?ev.id:null;
  document.getElementById("form-title").textContent=ev?"Editar Evento":"Novo Evento";
  document.getElementById("btn-delete-event").style.display=ev?"inline-flex":"none";

  // clear
  document.getElementById("f-name").value=ev?.nome||"";
  document.getElementById("f-tipo").value=ev?.tipo||"Firenight";
  document.getElementById("f-data").value=ev?.data||"";
  document.getElementById("f-hora").value=ev?.hora||"17:00";
  document.getElementById("f-versiculo").value=ev?.versiculo||"";
  document.getElementById("f-foto").value=ev?.foto||"";
  document.getElementById("f-dc-obs").value=ev?.dresscode?.obs||"";
  document.getElementById("escala-list").innerHTML="";
  document.getElementById("liturgia-list").innerHTML="";
  document.getElementById("materiais-list").innerHTML="";
  document.getElementById("setlist-groups").innerHTML="";
  dcSelected=ev?.dresscode?.cores?[...ev.dresscode.cores]:[];

  if(ev){
    (ev.escala||[]).forEach(p=>addEscalaRow(p.funcao||"",p.emoji||"",p.nome||""));
    (ev.liturgia||[]).forEach(p=>addLitRow(p.titulo||"",p.musicas||""));
    (ev.materiais||[]).forEach(m=>addMatRow(m.nome||"",m.url||"",m.emoji||"🔗"));
    (ev.setlist||[]).forEach(g=>addSetGroup(g.titulo||"",g.musicas||[]));
  }else{
    // Novo evento: pré-preenche escala padrão
    DEFAULT_ESCALA.forEach(p=>addEscalaRow(p.funcao,p.emoji,p.nome));
  }

  renderDcColors();
  showEventForm();
}

// ── COLLECT FORM DATA ──
function collectForm(){
  const escala=[];
  document.querySelectorAll("#escala-list .dyn-item").forEach(row=>{
    const emoji=row.querySelector("[data-field=emoji]")?.value.trim()||"";
    const funcao=row.querySelector("[data-field=funcao]")?.value.trim()||"";
    const nome=row.querySelector("[data-field=nome]")?.value.trim()||"";
    if(funcao||nome) escala.push({emoji,funcao,nome});
  });
  const setlist=[];
  document.querySelectorAll("#setlist-groups .sg-block").forEach(block=>{
    const titulo=block.querySelector("[data-field=titulo]")?.value.trim()||"";
    const musicas=[];
    block.querySelectorAll(".sg-songs .dyn-item").forEach(row=>{
      const nome=row.querySelector("[data-field=nome]")?.value.trim()||"";
      const artista=row.querySelector("[data-field=artista]")?.value.trim()||"";
      const tom=row.querySelector("[data-field=tom]")?.value.trim()||"";
      if(nome) musicas.push({nome,artista,tom});
    });
    if(titulo||musicas.length) setlist.push({titulo,musicas});
  });
  const liturgia=[];
  document.querySelectorAll("#liturgia-list .dyn-item").forEach(row=>{
    const titulo=row.querySelector("[data-field=titulo]")?.value.trim()||"";
    const musicas=row.querySelector("[data-field=musicas]")?.value.trim()||"";
    if(titulo) liturgia.push({titulo,musicas});
  });
  const materiais=[];
  document.querySelectorAll("#materiais-list .dyn-item").forEach(row=>{
    const emoji=row.querySelector("[data-field=emoji]")?.value.trim()||"🔗";
    const nome=row.querySelector("[data-field=nome]")?.value.trim()||"";
    const url=row.querySelector("[data-field=url]")?.value.trim()||"";
    if(nome||url) materiais.push({emoji,nome,url});
  });
  return{
    nome:document.getElementById("f-name").value.trim(),
    tipo:document.getElementById("f-tipo").value,
    data:document.getElementById("f-data").value,
    hora:document.getElementById("f-hora").value,
    versiculo:document.getElementById("f-versiculo").value.trim(),
    foto:document.getElementById("f-foto").value.trim(),
    escala,setlist,liturgia,materiais,
    dresscode:{cores:[...dcSelected],obs:document.getElementById("f-dc-obs").value.trim()},
    updatedAt:new Date().toISOString(),
  };
}

// ── SAVE EVENT ──
document.getElementById("btn-save-event").onclick=async()=>{
  const data=collectForm();
  if(!data.nome){toast("Digite o nome do evento","err");return}
  if(!data.data){toast("Selecione a data","err");return}
  try{
    if(editingEventId){
      await updateDoc(doc(db,EVENTS_COL,editingEventId),data);
      toast("Evento atualizado ✓");
    }else{
      await addDoc(collection(db,EVENTS_COL),{...data,createdAt:new Date().toISOString()});
      toast("Evento criado! 🔥");
    }
    await loadEvents();
    showAdminList();
  }catch(e){console.error(e);toast("Erro ao salvar","err")}
};

// ── DELETE EVENT ──
document.getElementById("btn-delete-event").onclick=async()=>{
  if(!editingEventId)return;
  if(!confirm("Excluir este evento? Esta ação não pode ser desfeita."))return;
  try{
    await deleteDoc(doc(db,EVENTS_COL,editingEventId));
    toast("Evento excluído","err");
    await loadEvents();
    closeAdmin();
  }catch(e){console.error(e);toast("Erro ao excluir","err")}
};

// ── EDIT FROM DETAIL ──
document.getElementById("btn-edit-detail").onclick=()=>{
  const id=document.getElementById("event-detail-content").querySelector("[data-ev-id]")?.dataset?.evId;
  // fallback: find event from title
};

</script>
